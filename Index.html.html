<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMDb Rating Predictor</title>
    <style>
        /* עיצוב כללי וצבעי רקע של IMDb */
        body {
            background-color: #121212;
            color: #f5f5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* מכל מרכזי של האפליקציה */
        .app-container {
            width: 100%;
            max-width: 900px;
            background-color: #1f1f1f;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            padding: 30px;
            box-sizing: border-box;
        }

        /* כותרת האתר בסגנון IMDb */
        h1 {
            color: #fff;
            font-size: 28px;
            margin-top: 0;
            margin-bottom: 25px;
            border-left: 4px solid #f5c518; /* הפס הצהוב המוכר של IMDb */
            padding-left: 10px;
        }

        /* חלוקת הממשק לשני חלקים: טופס ותוצאה */
        .main-layout {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        /* עיצוב אזור הטופס */
        .form-section {
            flex: 1.3;
            min-width: 300px;
        }

        /* סידור השדות בשני טורים */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 14px;
            color: #b3b3b3;
            margin-bottom: 6px;
            font-weight: 500;
        }

        /* עיצוב שדות הקלט */
        input[type="text"],
        input[type="number"] {
            background-color: #2c2c2c;
            border: 1px solid #3d3d3d;
            border-radius: 6px;
            color: #ffffff;
            padding: 12px;
            font-size: 15px;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #f5c518;
        }

        /* כפתור הניבוי הצהוב */
        .predict-btn {
            grid-column: 1 / -1; /* מתיחה על פני כל הרוחב של הגריד */
            background-color: #f5c518;
            color: #000000;
            border: none;
            border-radius: 6px;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .predict-btn:hover {
            background-color: #d4a313;
        }

        .predict-btn:active {
            transform: scale(0.98);
        }

        /* אזור התוצאות והשגיאות בצד */
        .result-section {
            flex: 1;
            min-width: 250px;
            background-color: #1a1a1a;
            border: 1px solid #2c2c2c;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 200px;
        }

        .result-title {
            font-size: 16px;
            color: #b3b3b3;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* תיבת הדירוג המוזהבת */
        .rating-box {
            font-size: 24px;
            font-weight: bold;
            color: #f5c518;
            border: 2px solid #f5c518;
            border-radius: 6px;
            padding: 15px 25px;
            background-color: rgba(245, 197, 24, 0.05);
            display: none; /* יופעל רק כשיש תוצאה */
            animation: fadeIn 0.4s ease-in-out;
        }

        /* הודעות שגיאה */
        .error-message {
            color: #ff4d4d;
            font-size: 14px;
            margin-top: 10px;
            max-width: 100%;
            word-wrap: break-word;
        }

        /* אנימציית הופעה חלקה לתוצאה */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>Movie Rating Predictor</h1>
        
        <div class="main-layout">
            <form id="predictionForm" class="form-section">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="tconst">Movie ID (tconst)</label>
                        <input type="text" id="tconst" placeholder="e.g., tt1234567" required>
                    </div>

                    <div class="form-group">
                        <label for="startYear">Start Year</label>
                        <input type="number" id="startYear" placeholder="e.g., 2020" required>
                    </div>

                    <div class="form-group">
                        <label for="runtimeMinutes">Runtime (Minutes)</label>
                        <input type="number" id="runtimeMinutes" placeholder="e.g., 120" required>
                    </div>

                    <div class="form-group">
                        <label for="genres">Genres</label>
                        <input type="text" id="genres" placeholder="e.g., Drama,Comedy" required>
                    </div>

                    <div class="form-group">
                        <label for="Language">Language</label>
                        <input type="text" id="Language" placeholder="e.g., English" required>
                    </div>

                    <div class="form-group">
                        <label for="lead_actors_ids">Lead Actors IDs</label>
                        <input type="text" id="lead_actors_ids" placeholder="e.g., nm0000138" required>
                    </div>

                    <button type="submit" class="predict-btn">Predict Rating</button>
                </div>
            </form>

            <div class="result-section">
                <div class="result-title">Prediction Result</div>
                <div id="result" class="rating-box"></div>
                <div id="error" class="error-message"></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById("predictionForm").addEventListener("submit", async function (event) {
            event.preventDefault();

            // איסוף הנתונים מהטופס - מוודא התאמה מלאה למפתחות ב-api.py
            const data = {
                tconst: document.getElementById("tconst").value.trim(),
                startYear: document.getElementById("startYear").value,
                runtimeMinutes: document.getElementById("runtimeMinutes").value,
                genres: document.getElementById("genres").value.trim(),
                Language: document.getElementById("Language").value.trim(),
                lead_actors_ids: document.getElementById("lead_actors_ids").value.trim()
            };

            const resultBox = document.getElementById("result");
            const errorBox = document.getElementById("error");

            // איפוס תצוגה לפני שליחה
            resultBox.style.display = "none";
            resultBox.innerText = "";
            errorBox.innerText = "";

            try {
                const response = await fetch("/predict", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (!response.ok) {
                    errorBox.innerText = result.error || "Something went wrong";
                    return;
                }

                // הצגת הדירוג החזוי בפורמט מעוגל
                if (result.predicted_rating !== undefined) {
                    resultBox.innerText = "Rating: " + Number(result.predicted_rating).toFixed(2) + " / 10";
                    resultBox.style.display = "block";
                } else {
                    errorBox.innerText = "Unexpected response structure from server.";
                }

            } catch (error) {
                errorBox.innerText = "Could not connect to the server. Make sure api.py is running.";
            }
        });
    </script>

</body>
</html>
